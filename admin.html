<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlindSpot | Administración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

<section class="admin-login" id="loginView">
  <div class="login-box">
    <span class="login-logo">BLIND<span>SPOT</span></span>
    <h2>Panel de administración</h2>
    <form id="loginForm">
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder=" " required>
        <label for="loginPassword">Contraseña</label>
      </div>
      <button type="submit" class="btn-primary">Iniciar sesión</button>
      <p class="login-error" id="loginError"></p>
    </form>
    <a href="index.html" class="back-to-site">&larr; Volver a la tienda</a>
  </div>
</section>

<div class="admin-layout" id="dashboardView" hidden>
  <aside class="admin-sidebar">
    <a href="index.html" class="admin-sidebar-logo">BLIND<span>SPOT</span></a>
    <nav class="admin-nav">
      <button class="admin-nav-btn active" data-tab="products">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.59 3.24H4a1 1 0 0 0-1 1v5.59a2 2 0 0 0 .59 1.41l9.58 9.58a2 2 0 0 0 2.82 0l4.6-4.6a2 2 0 0 0 0-2.82z"></path><circle cx="7" cy="8" r="1.5"></circle></svg>
        Productos
      </button>
      <button class="admin-nav-btn" data-tab="sales">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="M7 16l4-6 4 3 5-8"></path></svg>
        Ventas
      </button>
    </nav>
    <button class="admin-nav-logout" id="logoutBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg>
      Salir
    </button>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <h1 id="pageTitle">Productos</h1>
    </header>

    <section class="admin-panel" id="productsPanel">
      <div class="admin-card">
        <h2>Cargar producto</h2>
        <form id="productForm" class="product-form">
          <div class="form-group">
            <input type="text" id="prodName" placeholder=" " required>
            <label for="prodName">Nombre</label>
          </div>
          <div class="form-row">
            <select id="prodCategory" required>
              <option value="gorras">Gorras</option>
              <option value="gafas">Gafas</option>
            </select>
            <input type="number" id="prodPrice" placeholder="Precio" min="0" step="0.01" required>
          </div>

          <label class="upload-zone" id="uploadZone" for="prodImage">
            <input type="file" id="prodImage" accept="image/*" hidden>
            <div class="upload-placeholder" id="uploadPlaceholder">
              <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              <p><strong>Haz click</strong> o arrastra una imagen aquí</p>
              <span>PNG, JPG hasta 10MB</span>
            </div>
            <img id="prodImagePreview" class="upload-preview" hidden>
          </label>

          <div class="variations-builder">
            <h3>Variaciones (talla / color)</h3>
            <div id="variationsList"></div>
            <button type="button" class="btn-secondary" id="addVariationBtn">+ Añadir variación</button>
          </div>

          <button type="submit" class="btn-primary" id="prodSubmitBtn">Guardar producto</button>
        </form>
      </div>

      <div class="admin-card">
        <h2>Productos cargados</h2>
        <div class="admin-products-table" id="productsTable"></div>
      </div>
    </section>

    <section class="admin-panel" id="salesPanel" hidden>
      <div class="admin-stats" id="salesStats"></div>
      <div class="admin-card">
        <h2>Historial de ventas</h2>
        <div class="admin-sales-table" id="salesTable"></div>
      </div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  // Acceso temporal mientras se configura el login real con Firebase Authentication.
  (function () {
    var TEMP_ADMIN_PASSWORD = '1234';
    var loginView = document.getElementById('loginView');
    var dashboardView = document.getElementById('dashboardView');
    var loginForm = document.getElementById('loginForm');
    var loginError = document.getElementById('loginError');
    var logoutBtn = document.getElementById('logoutBtn');

    function setLoggedIn(loggedIn) {
      loginView.hidden = loggedIn;
      dashboardView.hidden = !loggedIn;
    }

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();
      loginError.textContent = '';
      var password = document.getElementById('loginPassword').value;
      if (password === TEMP_ADMIN_PASSWORD) {
        sessionStorage.setItem('blindspotAdmin', '1');
        setLoggedIn(true);
      } else {
        loginError.textContent = 'Contraseña incorrecta.';
      }
    });

    logoutBtn.addEventListener('click', function () {
      sessionStorage.removeItem('blindspotAdmin');
      setLoggedIn(false);
    });

    setLoggedIn(sessionStorage.getItem('blindspotAdmin') === '1');
  })();
</script>
<script type="module" src="admin.js"></script>
</body>
</html>
